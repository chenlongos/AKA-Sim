services:
  # -------- Development --------
  dev:
    build:
      context: .
      target: dev
    container_name: aka-sim-dev
    ports:
      - "80:80"
      - "5000:5000"
      - "5173:5173"    # Vite dev server
    volumes:
      - .:/app                    # Mount source code for hot reload
      - /app/frontend/node_modules # Prevent host/node_modules conflict
    environment:
      - FLASK_DEBUG=1
      - APP_HTTP_PORT=5000
      - PYTHONPATH=/app/backend
    command: python run.py

  # -------- Production --------
  prod:
    build:
      context: .
      target: prod
    container_name: aka-sim-prod
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_HTTP_PORT=80
      - APP_HTTPS_PORT=443
    restart: unless-stopped
